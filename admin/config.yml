backend:
  name: git-gateway
  branch: main

media_folder: "Images/Actus"
public_folder: "/Images/Actus"

locale: fr

collections:

  - name: "actualites"
    label: "Actualités"
    files:
      - name: "toutes-les-actus"
        label: "Toutes les actualités"
        file: "actualites/actualites.json"
        fields:
          - name: "actualites"
            label: "Actualités"
            widget: "list"
            label_singular: "Actualité"
            fields:
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Date", name: "date", widget: "string", hint: "Format : JJ/MM/AA" }
              - { label: "Texte", name: "texte", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }

  - name: "tarifs"
    label: "Tarifs"
    files:
      - name: "tous-les-tarifs"
        label: "Tous les tarifs"
        file: "tarifs/tarifs.json"
        fields:
          - { label: "Lien inscription", name: "lien_inscription", widget: "string" }
          - { label: "Frais d'inscription (€)", name: "frais_inscription", widget: "number" }
          - name: "abonnements"
            label: "Abonnements annuels"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Prix (€)", name: "prix", widget: "number" }
          - name: "carte"
            label: "Cours à la carte"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Prix (€)", name: "prix", widget: "number" }
          - name: "reduits"
            label: "Tarifs réduits"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Prix (€)", name: "prix", widget: "number" }

  - name: "profs"
    label: "Professeurs"
    files:
      - name: "tous-les-profs"
        label: "Tous les professeurs"
        file: "cours/profs.json"
        fields:
          - name: "profs"
            label: "Professeurs"
            widget: "list"
            label_singular: "Professeur"
            fields:
              - { label: "ID (sans majuscule, sans espace)", name: "id", widget: "string" }
              - { label: "Nom affiché", name: "name", widget: "string" }
              - name: "styles"
                label: "Styles enseignés"
                widget: "list"
                field: { label: "Style", name: "style", widget: "string" }
              - { label: "Biographie", name: "bio", widget: "text" }
              - { label: "Photo grande (modale)", name: "img", widget: "image" }
              - { label: "Photo profil (carte cours)", name: "profil", widget: "image" }

  - name: "styles"
    label: "Styles de danse"
    files:
      - name: "tous-les-styles"
        label: "Tous les styles"
        file: "cours/styles.json"
        fields:
          - name: "styles"
            label: "Styles"
            widget: "list"
            label_singular: "Style"
            fields:
              - { label: "ID (en minuscules)", name: "id", widget: "string" }
              - { label: "Nom affiché", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Image", name: "img", widget: "image" }

  - name: "planning"
    label: "Planning"
    files:
      - name: "planning-semaine"
        label: "Planning de la semaine"
        file: "cours/planning.json"
        fields:
          - name: "planning"
            label: "Créneaux"
            widget: "list"
            label_singular: "Créneau"
            fields:
              - { label: "Heure", name: "heure", widget: "string" }
              - label: "Lundi Studio 1"
                name: "lundi_s1"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Lundi Studio 2"
                name: "lundi_s2"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Mardi Studio 1"
                name: "mardi_s1"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Mardi Studio 2"
                name: "mardi_s2"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Mercredi Studio 1"
                name: "mercredi_s1"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Mercredi Studio 2"
                name: "mercredi_s2"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Jeudi Studio 1"
                name: "jeudi_s1"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Jeudi Studio 2"
                name: "jeudi_s2"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Vendredi Studio 1"
                name: "vendredi_s1"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
              - label: "Vendredi Studio 2"
                name: "vendredi_s2"
                widget: "object"
                fields:
                  - { label: "Cours", name: "cours", widget: "string" }
                  - { label: "Prof", name: "prof", widget: "string" }
